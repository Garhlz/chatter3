services:
  postgres:
    image: postgres:16-alpine
    container_name: chatter3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatter3
      POSTGRES_PASSWORD: chatter3
      POSTGRES_DB: chatter3
    ports:
      - "5432:5432"
    volumes:
      - chatter3_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatter3 -d chatter3"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chatter3_postgres_data:
